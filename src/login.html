<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../dist/output.css" />
  </head>

  <body
    class="relative min-h-screen flex items-center justify-center text-white overflow-hidden px-4 py-10 bg-gradient-to-br from-[#00171f] via-[#00202b] to-[#003b46]"
  >
    <!-- Card -->
    <div
      class="relative z-10 w-full max-w-6xl  h-[600px] rounded-2xl shadow-lg overflow-hidden flex flex-col md:flex-row"
    >
      <div
        class="md:w-1/2 h-full bg-white flex flex-col justify-center items-center text-center p-10"
        data-aos="fade-right"
        data-aos-duration="1000"
      >
        <div>
          <h2
            class="text-4xl text-slate-900 md:text-5xl font-bold mb-4"
            data-aos="fade-up"
            data-aos-delay="200"
          >
            Welcome to the
          </h2>
          <h1
            class="text-4xl text-[#00c2b3] md:text-6xl font-bold mb-6"
            data-aos="fade-up"
            data-aos-delay="400"
          >
            Mine To Your
          </h1>
          <p
            class="text-lg md:text-xl text-slate-900"
            data-aos="fade-up"
            data-aos-delay="600"
          >
            Share your old product to person who need here<br />Your journey
            starts here.
          </p>
        </div>
      </div>

      <div
        class="md:w-1/2 h-full p-12 bg-[#00c2b3] flex flex-col justify-center"
        data-aos="fade-left"
        data-aos-duration="1000"
      >
        <h2
          class="text-3xl font-bold mb-6 text-center"
          data-aos="fade-down"
          data-aos-delay="200"
        >
          Log In
        </h2>

        <form id="loginForm" class="space-y-5 relative">
          <div class="relative">
            <input
              type="text"
              id="username"
              placeholder="Username"
              required
              class="w-full px-4 py-3 rounded-md bg-white text-gray-800 placeholder-gray-400 hover:border border-[#ffcf33]/80 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
            <p id="usernameError" class="text-red-500 text-sm mt-1 hidden">
              Invalid username
            </p>
          </div>

          <div class="relative">
            <div class="relative">
              <input
                type="password"
                id="password"
                placeholder="Password"
                required
                class="w-full px-4 py-3 rounded-md bg-white text-gray-800 placeholder-gray-400 hover:border border-[#ffcf33]/80 focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
              <div class="absolute inset-y-0 right-3 flex items-center">
                <i
                  id="togglePassword"
                  class="fa fa-eye text-gray-400 cursor-pointer"
                ></i>
              </div>
            </div>
            <p id="passwordError" class="text-red-500 text-sm mt-1 hidden">
              Wrong password
            </p>
          </div>

          <button
            type="submit"
            id="loginBtn"
            class="w-full bg-slate-900 hover:bg-yellow-400 hover:text-black transition-colors text-white font-semibold py-3 rounded-full flex items-center justify-center"
          >
            Log In
          </button>
        </form>

        <p class="mt-6 text-center text-sm text-white">
          Don't have an account?
          <a href="./register.html" class="text-yellow-400 hover:underline"
            >Sign Up</a
          >
        </p>
      </div>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
  </body>
</html>
