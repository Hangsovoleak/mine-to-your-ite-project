<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../dist/output.css" />
  </head>

  <body
    class="relative min-h-screen flex items-center justify-center bg-[#0a1f1e] text-white overflow-hidden px-4 py-10 bg-gradient-to-br from-[#00171f] via-[#00202b] to-[#003b46]"
  >

    <!-- Card -->
    <div
      class="relative z-10 w-full max-w-6xl mx-auto h-full rounded-2xl shadow-lg overflow-hidden flex flex-col md:flex-row"
    >
      <div
        class="md:w-1/2 bg-white flex flex-col justify-center items-center text-center p-10"
        data-aos="fade-right"
        data-aos-duration="1000"
        data-aos-delay="200"
      >
        <h2
          class="text-4xl text-slate-900 md:text-5xl font-bold mb-4"
          data-aos="fade-up"
          data-aos-delay="200"
        >
          Welcome to the
        </h2>
        <h1
          class="text-4xl text-[#00c2b3] md:text-6xl font-bold mb-6"
          data-aos="fade-up"
          data-aos-delay="400"
        >
          Mine To Your
        </h1>
        <p
          class="text-lg md:text-xl text-slate-900"
          data-aos="fade-up"
          data-aos-delay="600"
        >
          Share your old product to person who need here<br />Your journey
          starts here.
        </p>
      </div>

      <div
        class="md:w-1/2 h-full p-12 bg-[#00c2b3] flex flex-col justify-center"
        data-aos="fade-left"
        data-aos-duration="1000"
        data-aos-delay="200"
      >
        <h2 class="text-3xl font-bold mb-6 text-center text-yellow-400">
          Sign Up
        </h2>
        <form id="signup-form" class="space-y-5" novalidate>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Username"
            required
            class="w-full px-4 py-3 rounded-md bg-white text-gray-800 placeholder-gray-400 hover:border border-[#ffcf33]/80 focus:outline-none"
            data-aos="fade-up"
            data-aos-delay="300"
          />
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Email Address"
            required
            class="w-full px-4 py-3 rounded-md bg-white text-gray-800 placeholder-gray-400 hover:border border-[#ffcf33]/80 focus:outline-none"
            data-aos="fade-up"
            data-aos-delay="400"
          />
          <div class="relative" data-aos="fade-up" data-aos-delay="500">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Password"
              required
              class="w-full px-4 py-3 rounded-md bg-white text-gray-800 placeholder-gray-400 hover:border border-[#ffcf33]/80 focus:outline-none"
            />
            <button
              type="button"
              id="togglePassword"
              class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-white"
            >
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
          <input
            type="url"
            id="profileUrl"
            name="profileUrl"
            placeholder="Profile URL (optional)"
            class="w-full px-4 py-3 rounded-md bg-white text-gray-800 placeholder-gray-400 hover:border border-[#ffcf33]/80 focus:outline-none"
            data-aos="fade-up"
            data-aos-delay="600"
          />
          <textarea
            id="bio"
            name="bio"
            placeholder="Bio (optional)"
            rows="3"
            class="w-full px-4 py-3 rounded-md bg-white text-gray-800 placeholder-gray-400 hover:border border-[#ffcf33]/80 focus:outline-none resize-none"
            data-aos="fade-up"
            data-aos-delay="700"
          ></textarea>

          <button
            type="submit"
            id="Signup"
            class="w-full bg-slate-900 hover:bg-yellow-400 hover:text-black transition-colors text-white font-semibold py-3 rounded-full flex items-center justify-center"
            data-aos="fade-up"
            data-aos-delay="800"
          >
            Sign up
          </button>

          <p id="message" class="text-center mt-2 text-red-500"></p>
        </form>

        <p class="mt-6 text-center text-sm text-white">
          Already have account?
          <a href="./login.html" class="text-yellow-400 hover:underline"
            >Log In</a
          >
        </p>
      </div>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
  </body>
</html>
